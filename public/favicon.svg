<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="项目炼金室">
  <defs>
    <style>
      .bg { fill: #f4f4f5; stroke: #e4e4e7; }
      .flask { fill: #52525b; }
      .dots { fill: #a1a1aa; }
      .spark { fill: #71717a; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #18181b; stroke: #3f3f46; }
        .flask { fill: #e4e4e7; }
        .dots { fill: #71717a; }
        .spark { fill: #a1a1aa; }
      }
    </style>
  </defs>

  <!-- 玻璃卡片底板 -->
  <rect class="bg" x="1" y="1" width="30" height="30" rx="8" stroke-width="1" />

  <!-- 炼金瓶 -->
  <rect class="flask" x="13.25" y="7.5" width="5.5" height="3.5" rx="1.25" />
  <path
    class="flask"
    d="M13.5 11h5v1.2c0 0 2.2 3.8 2.2 6.8a3.4 3.4 0 0 1-6.8 0c0-3 2.2-6.8 2.2-6.8V11Z"
  />

  <!-- 炼金微光 -->
  <path
    class="spark"
    d="M21.2 8.8 21.8 10l1.2.6-1.2.6-.6 1.2-.6-1.2-1.2-.6 1.2-.6.6-1.2Z"
  />

  <!-- 项目合集三点 -->
  <circle class="dots" cx="22.5" cy="22.5" r="1.35" />
  <circle class="dots" cx="25.5" cy="22.5" r="1.35" />
  <circle class="dots" cx="22.5" cy="25.5" r="1.35" />
</svg>
