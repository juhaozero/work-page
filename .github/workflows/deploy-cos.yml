name: Deploy to Tencent COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install coscli
        run: |
          wget -q https://github.com/tencentyun/coscli/releases/download/v1.0.7/coscli-v1.0.7-linux-amd64 -O coscli
          chmod +x coscli

      - name: Deploy to COS
        env:
          COS_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          COS_BUCKET: page-1316890155
          COS_REGION: ap-guangzhou
        run: |
          ./coscli sync dist/ "cos://${COS_BUCKET}/" \
            -r \
            --delete \
            --force \
            --secret-id "${COS_SECRET_ID}" \
            --secret-key "${COS_SECRET_KEY}" \
            --endpoint "cos.${COS_REGION}.myqcloud.com"
